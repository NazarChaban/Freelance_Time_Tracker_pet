version: "3.9"

services:
  freelance_time_tracker:
    container_name: freelance_time_tracker_web_container
    build: .
    volumes:
      - ./:/app
      - ./static:/app/static
    ports:
      - "${DJANGO_PORT}:8000"
    depends_on:
      - db-postgres
      - redis
    env_file:
      - .env

  db-postgres:
    image: postgres:latest
    container_name: db-postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "${REDIS_PORT}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}

volumes:
  postgres_data:
    name: postgres_data
